name: Dependency Audit

on:
  schedule:
    - cron: "17 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: dependency-audit
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - id: toolchain
        name: Read toolchain version
        run: |
          echo "bun=$(python3 -c 'import json; print(json.load(open("toolchain.json"))["bun"])')" >> "$GITHUB_OUTPUT"
          echo "cargo_audit=$(python3 -c 'import json; print(json.load(open("toolchain.json"))["cargoAudit"])')" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ steps.toolchain.outputs.bun }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version "${{ steps.toolchain.outputs.cargo_audit }}"
      - name: Audit locked dependencies
        run: ./scripts/verify.sh audit
