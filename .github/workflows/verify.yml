name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: core
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - id: toolchain
        name: Read toolchain version
        run: echo "bun=$(python3 -c 'import json; print(json.load(open("toolchain.json"))["bun"])')" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ steps.toolchain.outputs.bun }}
      - name: Ensure ShellCheck
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: command -v shellcheck >/dev/null 2>&1 || brew install shellcheck
      - name: Verify core
        env:
          # Playwright検査は専用のaccessibilityジョブ（必須チェック）が実行するため、
          # coreでは重複実行だけを省略する。ローカルの verify.sh pr は既定で実行する。
          VERIFY_SKIP_A11Y: "1"
        run: ./scripts/verify.sh pr

  desktop:
    name: desktop
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: changes
        name: Detect desktop changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- desktop scripts/verify.sh .github/workflows/verify.yml; then
            echo "required=false" >> "$GITHUB_OUTPUT"
          else
            echo "required=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify desktop
        if: steps.changes.outputs.required == 'true'
        run: ./scripts/verify.sh desktop
      - name: Skip desktop verification
        if: steps.changes.outputs.required != 'true'
        run: echo "desktop関連の変更がないためRustゲートを省略します"

  accessibility:
    name: accessibility
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - id: toolchain
        name: Read toolchain version
        run: echo "bun=$(python3 -c 'import json; print(json.load(open("toolchain.json"))["bun"])')" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ steps.toolchain.outputs.bun }}
      - name: Install client dependencies
        working-directory: app/client
        run: bun install --frozen-lockfile
      - name: Install Chromium for accessibility checks
        working-directory: app/client
        run: bunx playwright install chromium
      - name: Run accessibility checks
        working-directory: app/client
        run: bun run test:a11y
